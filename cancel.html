<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paiement annulé — ART BEYOND CONVENIENCE</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<script defer src="/_vercel/insights/script.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: oklch(0.2 0.012 60); color: oklch(0.92 0.006 70);
    font-family: 'Space Mono', monospace; -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 100vh;
  }
  .card { max-width: 480px; width: 100%; text-align: center; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 0.14em; opacity: 0.7; }
  .mark {
    width: 68px; height: 68px; margin: 28px auto 22px; border-radius: 50%;
    background: oklch(0.55 0.16 30); color: #fff; display: grid; place-items: center; font-size: 32px;
    animation: pop 0.4s cubic-bezier(0.22,0.61,0.36,1) both;
  }
  @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(26px, 6vw, 38px); margin: 0 0 12px; line-height: 1.05; }
  p { font-size: 13px; line-height: 1.75; opacity: 0.8; margin: 0 auto; max-width: 40ch; }
  .actions { margin-top: 30px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-block; text-decoration: none; font-weight: 700; font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; padding: 14px 24px;
    background: #fff; color: #111;
  }
  .btn.ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.5); }
  .btn:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">ART BEYOND CONVENIENCE</div>
    <div class="mark">×</div>
    <h1 id="title">Paiement annulé</h1>
    <p id="msg">Aucun montant n'a été débité. Votre panier est conservé — vous pouvez réessayer quand vous le souhaitez.</p>
    <div class="actions">
      <a class="btn" id="retry" href="/">Reprendre mes achats</a>
    </div>
  </div>
<script>
  (function () {
    var lang = "fr";
    try { var l = localStorage.getItem("abc_lang"); if (l === "en" || l === "fr") lang = l; } catch (e) {}
    var T = {
      fr: { title: "Paiement annulé", msg: "Aucun montant n'a été débité. Votre panier est conservé — vous pouvez réessayer quand vous le souhaitez.", retry: "Reprendre mes achats" },
      en: { title: "Payment canceled", msg: "No amount was charged. Your cart is kept — you can try again whenever you like.", retry: "Back to shopping" }
    };
    var t = T[lang];
    document.documentElement.lang = lang;
    document.getElementById("title").textContent = t.title;
    document.getElementById("msg").textContent = t.msg;
    document.getElementById("retry").textContent = t.retry;
  })();
</script>
</body>
</html>
