<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ART BEYOND CONVENIENCE — Mode & culture urbaine</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/logo.png">
<script>window.ABC_API_BASE = "https://web-production-62bbe.up.railway.app/";</script>
<!-- Catalogue injecté au déploiement par build.mjs. Vide en dev/local.
     Sert la PRÉSENTATION (affichage instantané, sans attendre l'API).
     Le STOCK de ce snapshot n'est PAS de confiance : il date du dernier
     déploiement, alors que qty change à chaque vente. La boutique n'autorise
     l'ajout au panier qu'une fois l'API confirmée (state.stockTrusted). -->
<script id="abc-catalog" type="application/json">[]</script>
<!-- Vercel Web Analytics + Speed Insights (site statique) -->
<script defer src="/_vercel/insights/script.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
  /* Polices auto-hébergées (RGPD : aucune requête vers Google Fonts —
     charger depuis fonts.googleapis.com transmettait l'IP de chaque
     visiteur à Google sans consentement). Fichiers : /fonts/. */
  @font-face { font-family: 'Syne'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/syne-latin-500-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Syne'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/syne-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Syne'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/syne-latin-700-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Syne'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/syne-latin-800-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Space Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/space-mono-latin-400-normal.woff2') format('woff2'); }
  @font-face { font-family: 'Space Mono'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/space-mono-latin-700-normal.woff2') format('woff2'); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: oklch(0.955 0.006 70);
    color: oklch(0.2 0.012 60);
    font-family: 'Space Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }
  a { color: oklch(0.55 0.11 40); text-decoration: none; }
  a:hover { color: oklch(0.45 0.11 40); }

  button { font-family: 'Space Mono', monospace; }

  @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes lbCard { from { opacity: 0; transform: translateY(14px) scale(0.985); } to { opacity: 1; transform: none; } }
  @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* header */
  .hdr {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 16px 24px; color: #fff; pointer-events: none;
    background: linear-gradient(to bottom, rgba(18,16,15,0.55), rgba(18,16,15,0));
  }
  .brandwrap { display: flex; align-items: center; gap: 10px; }
  .logo-chip { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 7px; background: #fff; padding: 4px; display: grid; place-items: center; }
  .logo-chip img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.05em; line-height: 1.05; white-space: nowrap; }
  .tagline { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; opacity: 0.85; margin-top: 5px; white-space: nowrap; }
  @media (max-width: 480px) {
    .brand { font-size: 12px; letter-spacing: 0.03em; }
    .logo-chip { width: 30px; height: 30px; }
  }
  @media (max-width: 340px) {
    .tagline { display: none; }
  }

  .pills { pointer-events: auto; display: flex; align-items: center; gap: 6px; padding: 5px; border: 1px solid rgba(255,255,255,0.5); }
  .pill {
    appearance: none; background: transparent; border: 0; color: #fff;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 11px; cursor: pointer; transition: background .15s, color .15s;
  }
  .pill.active { background: #fff; color: #111; }

  .right { pointer-events: auto; display: flex; align-items: center; gap: 12px; }
  .langbtn, .cartbtn {
    appearance: none; display: flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid rgba(255,255,255,0.5); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 7px 12px; cursor: pointer;
  }
  .cartbtn { position: relative; }
  .cart-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 17px; height: 17px; padding: 0 5px; border-radius: 9px;
    background: oklch(0.62 0.16 40); color: #fff; font-size: 10px; font-weight: 700;
    letter-spacing: 0; line-height: 1;
  }
  .meta-right { text-align: right; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
  .meta-right div { opacity: 0.85; }
  .meta-right div + div { margin-top: 5px; }

  @media (max-width: 720px) {
    .pills { display: none; }
    .meta-right { display: none; }
  }

  /* Mobile: keep the recomposition mosaic, laid out as a responsive
     grid of 1 / 2 / 3 columns (column count chosen in mobileCols()). */
  @media (max-width: 640px) {
    .stage { inset: 70px 10px 12px; }
  }
  /* Touch devices have no hover: always show the quick-add button. */
  @media (hover: none) {
    .tile-add { opacity: 1; pointer-events: auto; }
  }

  /* mosaic */
  .driver { position: relative; height: 520vh; }
  .stick { position: sticky; top: 0; height: 100vh; overflow: hidden; }
  .stage { position: absolute; inset: 82px 24px 24px 24px; }
  .grid { position: relative; width: 100%; height: 100%; }
  /* Message d'état de la mosaïque (chargement / erreur API). Masqué dès que
     le catalogue est rendu. */
  .grid-msg {
    position: absolute; inset: 0; display: none; place-content: center;
    text-align: center; line-height: 1.6; padding: 0 24px;
    font-size: 13px; letter-spacing: 0.04em; color: oklch(0.55 0.02 70);
  }
  .grid-msg.on { display: grid; }
  /* Bandeau « stock non vérifié » : se superpose SANS masquer la mosaïque —
     les pièces restent visibles, seule la vente est bloquée. */
  .stale-banner {
    position: absolute; left: 0; right: 0; bottom: 0; display: none;
    padding: 10px 16px; text-align: center; line-height: 1.5;
    font-size: 12px; letter-spacing: 0.03em;
    background: oklch(0.55 0.16 40 / 0.94); color: oklch(0.99 0 0);
    border-radius: 0 0 10px 10px;
  }
  .stale-banner.on { display: block; }

  .tile {
    position: absolute; left: 0; top: 0; width: 80px; height: 80px; overflow: hidden;
    background: oklch(0.9 0.006 70); cursor: pointer; will-change: left, top, width, height;
    border-radius: 10px;
    --fs: 12px;
  }
  .ph { position: absolute; inset: 0; display: grid; place-items: center; }
  .ph .ghost {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: calc(var(--fs) * 4.4); line-height: 1; color: rgba(255,255,255,0.16);
    letter-spacing: -0.02em;
  }
  .phb { position: absolute; inset: 0; opacity: 0; }

  .metaov {
    position: absolute; left: 0; right: 0; bottom: 0; padding: calc(var(--fs) * 0.9);
    background: linear-gradient(to top, rgba(15,14,13,0.78), rgba(15,14,13,0.3) 55%, transparent);
    color: #fff; pointer-events: none; z-index: 5;
  }
  .metaov .num { font-size: calc(var(--fs) * 0.72); letter-spacing: 0.18em; opacity: 0.75; font-variant-numeric: tabular-nums; }
  .metaov .ttl { font-family: 'Syne', sans-serif; font-weight: 700; font-size: calc(var(--fs) * 1.18); line-height: 1.02; margin-top: 3px; text-wrap: balance; }
  .metaov .row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-top: 5px; }
  .metaov .cat { font-size: calc(var(--fs) * 0.66); letter-spacing: 0.24em; text-transform: uppercase; opacity: 0.82; }
  .metaov .price { font-size: calc(var(--fs) * 0.82); font-weight: 700; opacity: 0.95; font-variant-numeric: tabular-nums; }

  .tile-add {
    position: absolute; top: calc(var(--fs) * 0.7); right: calc(var(--fs) * 0.7); z-index: 6;
    appearance: none; border: 0; cursor: pointer;
    width: calc(var(--fs) * 2.1); height: calc(var(--fs) * 2.1); border-radius: 50%;
    background: rgba(255,255,255,0.92); color: #111;
    font-size: calc(var(--fs) * 1.3); font-weight: 700; line-height: 1;
    display: grid; place-items: center; opacity: 0; transition: opacity .18s, transform .12s, background .15s;
    pointer-events: none;
  }
  .tile:hover .tile-add { opacity: 1; pointer-events: auto; }
  .tile-add:hover { background: oklch(0.62 0.16 40); color: #fff; }
  .tile-add:active { transform: scale(0.9); }

  /* lightbox */
  .lb-scrim {
    position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
    padding: 5vh 5vw; background: rgba(18,16,15,0.86); backdrop-filter: blur(6px);
    animation: lbIn 0.22s ease both; cursor: zoom-out;
  }
  .lb-card {
    display: flex; flex-direction: column; width: min(760px, 92vw); max-height: 90vh;
    background: oklch(0.965 0.006 70); animation: lbCard 0.32s cubic-bezier(0.22,0.61,0.36,1) both;
    cursor: default; overflow: hidden;
  }
  .lb-img { position: relative; width: 100%; aspect-ratio: 1 / 1; background: oklch(0.9 0.006 70); overflow: hidden; }
  .lb-img .ghost { font-size: 96px; }
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 6;
    appearance: none; border: 0; cursor: pointer; width: 40px; height: 40px;
    background: rgba(255,255,255,0.9); color: #111; font-size: 24px; line-height: 1;
    display: grid; place-items: center; border-radius: 50%; transition: background .15s;
  }
  .lb-nav:hover { background: #fff; }
  .lb-nav.prev { left: 12px; }
  .lb-nav.next { right: 12px; }
  .lb-count {
    position: absolute; top: 12px; right: 12px; z-index: 6;
    background: rgba(15,14,13,0.66); color: #fff; font-size: 11px; letter-spacing: 0.08em;
    padding: 4px 9px; border-radius: 20px; font-variant-numeric: tabular-nums;
  }
  .lb-dots { position: absolute; left: 0; right: 0; bottom: 12px; z-index: 6; display: flex; justify-content: center; gap: 7px; }
  .lb-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.55); cursor: pointer; transition: background .15s, transform .15s; }
  .lb-dot.on { background: #fff; transform: scale(1.25); }
  .lb-thumbs { display: flex; gap: 8px; padding: 12px 26px 0; overflow-x: auto; }
  .lb-thumb { flex: 0 0 auto; width: 54px; height: 54px; border-radius: 6px; overflow: hidden; cursor: pointer; opacity: 0.55; outline: 2px solid transparent; transition: opacity .15s, outline-color .15s; }
  .lb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .lb-thumb.on { opacity: 1; outline-color: oklch(0.55 0.16 40); }
  .lb-thumb:hover { opacity: 1; }
  .zoom-scrim { position: fixed; inset: 0; z-index: 80; background: rgba(10,9,8,0.95); display: flex; align-items: center; justify-content: center; padding: 3vh 3vw; cursor: zoom-out; animation: lbIn 0.18s ease both; }
  .zoom-img { max-width: 96vw; max-height: 94vh; object-fit: contain; display: block; }
  .price.sold, .lb-price.sold { color: oklch(0.64 0.21 25); }
  .lb-body { padding: 22px 26px 26px; display: flex; flex-direction: column; gap: 10px; overflow: auto; }
  .lb-top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
  .lb-cat { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: oklch(0.55 0.11 40); }
  .lb-num { font-size: 11px; letter-spacing: 0.2em; opacity: 0.55; font-variant-numeric: tabular-nums; }
  .lb-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(26px, 4vw, 40px); line-height: 1.02; margin: 0; text-wrap: balance; }
  .lb-desc { font-size: 13px; line-height: 1.7; opacity: 0.78; margin: 4px 0 0; max-width: 52ch; }
  .lb-buy { display: flex; align-items: center; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
  .lb-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; font-variant-numeric: tabular-nums; }
  .btn-primary {
    appearance: none; background: oklch(0.2 0.012 60); color: #fff; border: 0;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; padding: 13px 22px; cursor: pointer;
    transition: background .15s;
  }
  .btn-primary:hover { background: oklch(0.32 0.05 40); }
  .btn-ghost {
    appearance: none; background: transparent; color: oklch(0.2 0.012 60); border: 1px solid oklch(0.2 0.012 60 / 0.35);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; padding: 12px 18px; cursor: pointer;
  }
  .btn-ghost:hover { border-color: oklch(0.2 0.012 60); }

  /* cart drawer */
  .cart-scrim { position: fixed; inset: 0; z-index: 70; background: rgba(18,16,15,0.5); animation: lbIn 0.2s ease both; }
  .cart {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 71; width: min(420px, 100vw);
    background: oklch(0.965 0.006 70); display: flex; flex-direction: column;
    animation: drawerIn 0.3s cubic-bezier(0.22,0.61,0.36,1) both; box-shadow: -20px 0 60px rgba(18,16,15,0.3);
  }
  .cart-head { display: flex; align-items: center; justify-content: space-between; padding: 22px 22px 16px; border-bottom: 1px solid oklch(0.2 0.012 60 / 0.12); }
  .cart-head h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin: 0; letter-spacing: 0.02em; }
  .cart-close { appearance: none; background: transparent; border: 0; font-size: 22px; line-height: 1; cursor: pointer; color: oklch(0.2 0.012 60); padding: 4px 8px; }
  .cart-items { flex: 1; overflow: auto; padding: 8px 22px; }
  .cart-empty { opacity: 0.55; font-size: 13px; text-align: center; padding: 60px 10px; line-height: 1.7; }
  .ci { display: flex; gap: 14px; padding: 16px 0; border-bottom: 1px solid oklch(0.2 0.012 60 / 0.1); }
  .ci-thumb { width: 66px; height: 66px; flex: 0 0 66px; overflow: hidden; position: relative; background: oklch(0.9 0.006 70); }
  .ci-thumb .ghost { font-size: 30px; }
  .ci-main { flex: 1; min-width: 0; }
  .ci-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; line-height: 1.1; }
  .ci-cat { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; margin-top: 3px; }
  .ci-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 10px; }
  .qty { display: inline-flex; align-items: center; border: 1px solid oklch(0.2 0.012 60 / 0.3); }
  .qty button { appearance: none; background: transparent; border: 0; width: 26px; height: 26px; cursor: pointer; font-size: 15px; line-height: 1; color: oklch(0.2 0.012 60); }
  .qty button:hover { background: oklch(0.2 0.012 60 / 0.08); }
  .qty span { min-width: 26px; text-align: center; font-size: 13px; font-variant-numeric: tabular-nums; }
  .ci-price { font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
  .ci-remove { appearance: none; background: transparent; border: 0; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; cursor: pointer; padding: 0; margin-top: 6px; }
  .ci-remove:hover { opacity: 1; color: oklch(0.55 0.16 30); }
  .cart-foot { padding: 18px 22px 24px; border-top: 1px solid oklch(0.2 0.012 60 / 0.12); }
  .cart-line { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
  .cart-total { display: flex; align-items: baseline; justify-content: space-between; margin: 10px 0 16px; }
  .cart-total .lbl { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.7; }
  .cart-total .val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; font-variant-numeric: tabular-nums; }
  .checkout-btn { width: 100%; text-align: center; }

  /* checkout confirmation */
  .confirm { text-align: center; padding: 40px 10px; animation: toastIn 0.35s ease both; }
  .confirm .tick { width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 50%; background: oklch(0.62 0.14 150); color: #fff; display: grid; place-items: center; font-size: 28px; }
  .confirm h3 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; margin: 0 0 8px; }
  .confirm p { font-size: 13px; line-height: 1.7; opacity: 0.72; margin: 0 auto; max-width: 34ch; }
  .confirm .order { margin-top: 14px; font-size: 12px; letter-spacing: 0.14em; opacity: 0.9; }

  /* toast */
  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 90;
    background: oklch(0.2 0.012 60); color: #fff; padding: 12px 20px;
    font-size: 12px; letter-spacing: 0.06em; animation: toastIn 0.25s ease both;
    box-shadow: 0 10px 30px rgba(18,16,15,0.35); pointer-events: none;
  }

  /* footer / about */
  .foot {
    position: relative; z-index: 1; background: oklch(0.2 0.012 60); color: oklch(0.86 0.006 70);
    padding: 64px 26px 72px;
  }
  .foot-inner { max-width: 680px; margin: 0 auto; text-align: center; }
  .foot-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(30px, 6vw, 52px); line-height: 0.95; letter-spacing: -0.01em; }
  .about { margin-top: 26px; font-size: 13px; line-height: 1.85; opacity: 0.82; }
  .about p { margin: 0 0 14px; text-align: center; }
  .about p:last-child { margin-bottom: 0; }
  .about em { opacity: 0.7; font-size: 12px; }
  .foot-contact { margin-top: 40px; padding-top: 24px; border-top: 1px solid oklch(0.86 0.006 70 / 0.16); font-size: 12px; letter-spacing: 0.06em; }
  .foot-contact a { color: oklch(0.86 0.006 70); }
  .foot-contact a:hover { color: #fff; }
  .foot-legal { margin-top: 8px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.55; }
  .socials { margin-top: 34px; display: flex; justify-content: center; gap: 14px; }
  .socials a { display: inline-flex; width: 40px; height: 40px; border-radius: 50%; align-items: center; justify-content: center; color: oklch(0.86 0.006 70); border: 1px solid oklch(0.86 0.006 70 / 0.22); transition: color .15s, background .15s, border-color .15s; }
  .socials a:hover { color: #111; background: #fff; border-color: #fff; }
  .socials svg { width: 19px; height: 19px; display: block; }
  .foot-links { margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 20px; font-size: 11px; letter-spacing: 0.06em; }
  .foot-links a { color: oklch(0.86 0.006 70 / 0.75); text-decoration: none; }
  .foot-links a:hover { color: #fff; text-decoration: underline; }

  /* listen / SoundCloud */
  .listen { position: relative; z-index: 1; background: oklch(0.24 0.012 60); color: oklch(0.9 0.006 70); padding: 56px 26px; }
  .listen-inner { max-width: 680px; margin: 0 auto; text-align: center; }
  .listen-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(24px, 5vw, 36px); letter-spacing: 0.01em; line-height: 1; }
  .listen-sub { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.6; margin-top: 8px; }
  .sc-player { width: 100%; height: 400px; border: 0; margin-top: 22px; border-radius: 8px; display: block; }
  /* Façade RGPD : le lecteur SoundCloud n'est chargé qu'au clic. */
  .sc-facade { display: grid; place-items: center; text-align: center; cursor: pointer; background: oklch(0.2 0.012 60); border: 1px dashed oklch(0.9 0.006 70 / 0.28); padding: 24px; }
  .sc-play { width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 50%; background: oklch(0.32 0.05 40); color: #fff; display: grid; place-items: center; font-size: 22px; transition: background .15s; }
  .sc-facade:hover .sc-play, .sc-facade:focus-visible .sc-play { background: oklch(0.62 0.16 40); }
  .sc-facade-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .sc-facade-note { font-size: 11px; line-height: 1.6; opacity: 0.6; margin-top: 10px; max-width: 52ch; }
</style>
</head>
<body>

<header class="hdr">
  <div style="pointer-events:auto;">
    <div class="brandwrap">
      <span class="logo-chip"><img src="/logo.png" alt="ART BEYOND CONVENIENCE" width="34" height="34"></span>
      <div>
        <div class="brand">ART BEYOND CONVENIENCE</div>
        <div class="tagline" id="tagline"></div>
      </div>
    </div>
  </div>

  <div class="right">
    <button class="langbtn" id="langBtn" title="FR / EN"><span style="opacity:.55;">↔</span><span id="langLabel"></span></button>
    <button class="cartbtn" id="cartBtn"><span id="cartWord"></span><span class="cart-count" id="cartCount">0</span></button>
    <div class="meta-right">
      <div id="countLabel"></div>
      <div id="scrollLabel"></div>
    </div>
  </div>
</header>

<div class="driver" id="driver">
  <div class="stick">
    <div class="stage">

<script>
(function () {
  "use strict";

  // ---------------------------------------------------------------------------
  // Catalogue — snapshot injecté au build, puis rafraîchi par l'API.
  //
  //   snapshot (build.mjs)  -> PRÉSENTATION : noms, images, descriptions, prix.
  //                            Permet d'afficher la mosaïque instantanément,
  //                            sans dépendre du réveil de Railway.
  //   API (au runtime)      -> VÉRITÉ : le stock, qui change à chaque vente.
  //
  // Le stock du snapshot date du dernier déploiement : il ne fait PAS foi.
  // `state.stockTrusted` reste faux tant que l'API n'a pas répondu, et
  // `canAdd()` refuse alors toute mise au panier. On affiche, on ne vend pas.
  // ---------------------------------------------------------------------------
  function embeddedCatalog() {
    try {
      var node = document.getElementById("abc-catalog");
      var list = node ? JSON.parse(node.textContent || "[]") : [];
      return Array.isArray(list) ? list : [];
    } catch (e) { return []; }
  }

  var CATALOG = [];

  var UI = {
    fr: {
      tagline: "Mode & culture urbaine",
      count: function (n) { return n + (n > 1 ? " pièces" : " pièce"); }, scroll: "Défilez ↓", close: "Fermer",
      loading: "Chargement…", loadError: "Catalogue momentanément indisponible.<br>Réessayez dans un instant.",
      stockUnknown: "Disponibilités non vérifiables pour le moment — la commande est momentanément suspendue. Réessayez dans un instant.",
      stockUnverified: "Disponibilité non vérifiée",
      footTitle: "À propos", listen: "Écouter", listenSub: "La playlist ABC de Split",
      scPlay: "Charger le lecteur SoundCloud",
      scConsent: "Le lecteur n'est chargé qu'à votre demande. En cliquant, vous acceptez que SoundCloud reçoive des données (adresse IP, cookies).",
      about: "<p>Chaque création est une œuvre unique.</p><p>Conçue et réalisée à la main, elle associe des pièces neuves et des objets existants, minutieusement sélectionnés puis réinterprétés. Chaque matière est choisie pour son histoire, sa texture et sa capacité à dialoguer avec l'ensemble.</p><p>Imaginer, déconstruire, remodeler, assembler. Le geste est lent, précis, presque méditatif. Chaque œuvre naît d'un équilibre entre mémoire, détournement et création contemporaine.</p><p>Split développe depuis toujours une démarche où l'écriture et les arts plastiques se répondent. Auteur de textes depuis l'adolescence, influencé par le cinéma romantique des années 90, la chanson française à texte et l'esthétique du rap, il transpose cette même sensibilité dans ses œuvres. Chaque création est pensée comme un récit silencieux, où les objets deviennent langage et où la matière prolonge les mots.</p><p>L'œuvre n'a pas vocation à faire consensus. Elle invite à ralentir, à observer et à interroger le regard que nous portons sur les objets, leur valeur et leur fonction.</p><p>Art Beyond Convenience.</p><p><em>Nota bene : Conformément au Code de la propriété intellectuelle, certaines créations peuvent intégrer des œuvres préexistantes dans une démarche de parodie, de pastiche ou de caricature. Elles relèvent de la liberté d'expression artistique et participent à une réflexion critique sur les images, les objets et la culture contemporaine.</em></p>",
      other: "EN", cart: "Panier", add: "Ajouter au panier", added: "Ajouté au panier",
      empty: "Votre panier est vide.<br>Ajoutez une pièce depuis la mosaïque.",
      subtotal: "Sous-total", shipping: "Livraison", free: "Offerte", total: "Total",
      checkout: "Passer commande", remove: "Retirer", continue: "Continuer",
      confirmTitle: "Commande confirmée",
      confirmMsg: "Merci ! Votre commande de pièces uniques a bien été enregistrée. Un e-mail de confirmation vous attend.",
      order: "Commande", unique: "Pièce unique",
      color: "Couleur", size: "Taille", ref: "Réf.",
      soldout: "Épuisé", inCart: "Déjà dans le panier", lastOne: "Dernière pièce",
    },
    en: {
      tagline: "Fashion & urban culture",
      count: function (n) { return n + (n > 1 ? " pieces" : " piece"); }, scroll: "Scroll ↓", close: "Close",
      loading: "Loading…", loadError: "Catalogue temporarily unavailable.<br>Please try again in a moment.",
      stockUnknown: "Availability can't be verified right now — ordering is temporarily paused. Please try again in a moment.",
      stockUnverified: "Availability unverified",
      footTitle: "About", listen: "Listen", listenSub: "Split's ABC playlist",
      scPlay: "Load the SoundCloud player",
      scConsent: "The player only loads on demand. By clicking, you agree that SoundCloud receives data (IP address, cookies).",
      about: "<p>Each creation is a one-of-a-kind work of art.</p><p>Designed and handcrafted, every piece combines new and reclaimed components, carefully selected and reinterpreted. Each material is chosen for its history, texture, and ability to engage in dialogue with the whole.</p><p>Imagine. Deconstruct. Reshape. Assemble. The process is deliberate, meticulous, almost meditative. Every work emerges from a balance of memory, transformation, and contemporary creation.</p><p>Split has always developed a practice where writing and visual art coexist. Writing lyrics since adolescence, influenced by 1990s romantic cinema, French chanson, and the raw energy of rap, he brings the same sensibility into his artworks. Each creation is conceived as a silent narrative, where objects become language and materials extend what words cannot express.</p><p>The work is not intended to reach consensus. It invites viewers to slow down, observe, and question the way we perceive objects, their value, and their purpose.</p><p>Art Beyond Convenience.</p><p><em>Note: In accordance with intellectual property law, some artworks may incorporate pre-existing works as parody, pastiche, or caricature. These creations are part of artistic freedom of expression and aim to encourage reflection, interpretation, and dialogue about images, objects, and contemporary culture.</em></p>",
      other: "FR", cart: "Cart", add: "Add to cart", added: "Added to cart",
      empty: "Your cart is empty.<br>Add a piece from the mosaic.",
      subtotal: "Subtotal", shipping: "Shipping", free: "Free", total: "Total",
      checkout: "Checkout", remove: "Remove", continue: "Continue shopping",
      confirmTitle: "Order confirmed",
      confirmMsg: "Thank you! Your order of one-of-a-kind pieces has been placed. A confirmation e-mail is on its way.",
      order: "Order", unique: "One-of-a-kind",
      color: "Color", size: "Size", ref: "Ref.",
      soldout: "Sold out", inCart: "Already in cart", lastOne: "Last one",
    },
  };

  var CAT_LABEL = {
    fr: { tshirt: "T-shirt", sweater: "Sweat", jacket: "Veste" },
    en: { tshirt: "T-shirt", sweater: "Sweater", jacket: "Jacket" },
  };

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  var state = {
    effect: "recompose",
    lang: "fr",
    lb: null,          // lightbox index
    cartOpen: false,
    checkout: false,   // showing confirmation
    // Panier persisté par ID PRODUIT (clé = String(id)), jamais par index :
    // l'ordre du catalogue change (tri admin, suppression) alors qu'un panier
    // sauvegardé peut avoir des jours d'avance. Un index périmé ferait payer
    // la mauvaise pièce. Les entrées orphelines sont purgées par pruneCart().
    cart: {},          // { productId: qty }
    orderNo: null,
    gridMsg: "loading", // état de la mosaïque : "loading" | "error" | null
    // Le stock est-il confirmé par l'API ? Faux tant qu'elle n'a pas répondu :
    // le snapshot du build ne fait pas foi (voir canAdd()).
    stockTrusted: false,
  };

  // persistence (safe on file:// via try/catch)
  // ⚠ CLÉS PARTAGÉES avec success.html (qui vide abc_cart après paiement) et
  // cancel.html (qui lit abc_lang) : ne pas renommer isolément.
  try {
    var saved = localStorage.getItem("abc_cart");
    if (saved) state.cart = JSON.parse(saved) || {};
    var savedLang = localStorage.getItem("abc_lang");
    if (savedLang === "en" || savedLang === "fr") state.lang = savedLang;
  } catch (e) {}

  function persist() {
    try {
      localStorage.setItem("abc_cart", JSON.stringify(state.cart));
      localStorage.setItem("abc_lang", state.lang);
    } catch (e) {}
  }

  var N = CATALOG.length;

  function resolveImg(u) { return u ? (/^https?:\/\//.test(u) ? u : ("img/" + u)) : ""; }

  function articlesFor(lang) {
    return CATALOG.map(function (p, i) {
      var srcs = (p.images && p.images.length) ? p.images : (p.img ? [p.img] : []);
      var imgs = srcs.map(resolveImg).filter(Boolean);
      return {
        i: i,
        id: p.id,
        numLabel: String(i + 1).padStart(2, "0"),
        title: p.name, cat: p.cat,
        desc: lang === "fr" ? p.descFr : p.descEn,
        price: p.price,
        color: p.color, size: p.size, ref: p.ref, stock: p.qty,
        img: imgs[0] || "",
        images: imgs,
      };
    });
  }
  var articles = articlesFor(state.lang);
  var articlesById = indexById(articles);

  function indexById(list) {
    var m = {};
    list.forEach(function (a) { m[a.id] = a; });
    return m;
  }

  // Purge les entrées de panier orphelines : pièce disparue du catalogue,
  // épuisée, ou quantité excessive. UNIQUEMENT une fois le stock confirmé par
  // l'API : avant, le catalogue peut être vide (snapshot absent, cold start)
  // et purger sur cette base détruirait un panier valide. Un panier persisté
  // peut avoir des jours d'avance sur le catalogue.
  function pruneCart() {
    if (!state.stockTrusted) return;
    var changed = false;
    for (var k in state.cart) {
      var a = articlesById[k];
      if (!a || a.stock <= 0) { delete state.cart[k]; changed = true; }
      else if (state.cart[k] > a.stock) { state.cart[k] = a.stock; changed = true; }
    }
    if (changed) persist();
  }

  function money(v) {
    return state.lang === "fr" ? (v + " €") : ("€" + v);
  }

  // deterministic patchwork tile background per index
  function tileBg(i) {
    var h1 = (i * 47 + 20) % 360;
    var h2 = (i * 83 + 200) % 360;
    var c1 = "oklch(0.62 0.11 " + h1 + ")";
    var c2 = "oklch(0.42 0.09 " + h2 + ")";
    var c3 = "oklch(0.72 0.08 " + ((h1 + 40) % 360) + ")";
    return "linear-gradient(135deg, " + c1 + " 0%, " + c2 + " 60%, " + c3 + " 100%)";
  }

  // ---------------------------------------------------------------------------
  // Seeded arrangements (ported from the original component)
  // ---------------------------------------------------------------------------
  function rng(seed) {
    var s = seed >>> 0;
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function shuffle(arr, rnd) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rnd() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }
  function partition(x, y, w, h, idxs, weights, horiz, out) {
    if (idxs.length === 1) { out[idxs[0]] = { x: x, y: y, w: w, h: h }; return; }
    var total = idxs.reduce(function (s, k) { return s + weights[k]; }, 0);
    var acc = 0, split = 1;
    for (var k = 0; k < idxs.length; k++) {
      acc += weights[idxs[k]];
      if (acc >= total / 2) { split = k + 1; break; }
    }
    split = Math.max(1, Math.min(idxs.length - 1, split));
    var a = idxs.slice(0, split), b = idxs.slice(split);
    var wa = a.reduce(function (s, k) { return s + weights[k]; }, 0);
    var frac = wa / total;
    if (horiz) {
      var w1 = w * frac;
      partition(x, y, w1, h, a, weights, false, out);
      partition(x + w1, y, w - w1, h, b, weights, false, out);
    } else {
      var h1 = h * frac;
      partition(x, y, w, h1, a, weights, true, out);
      partition(x, y + h1, w, h - h1, b, weights, true, out);
    }
  }

  var arrangements = [], depth = [], phase = [];

  // Mobile: recomposition over a clean grid of `cols` columns.
  // Each of the 4 arrangements is a different shuffle of the pieces into the
  // grid cells, so scrolling still morphs the layout (recomposition kept).
  function buildGridArrangements(cols) {
    var rows = Math.ceil(N / cols);
    var base = Array.from({ length: N }, function (_, i) { return i; });
    arrangements = [];
    for (var s = 0; s < 4; s++) {
      var rnd = rng(2000 + s * 613);
      var order = shuffle(base, rnd);
      var out = new Array(N);
      for (var cell = 0; cell < N; cell++) {
        var r = Math.floor(cell / cols), c = cell % cols;
        out[order[cell]] = { x: c / cols, y: r / rows, w: 1 / cols, h: 1 / rows };
      }
      arrangements.push(out);
    }
    depth = base.map(function () { return 0; });
    phase = base.map(function () { return 0; });
  }

  function buildArrangements() {
    // Catalogue vide (API pas encore répondu, ou en erreur) : rien à disposer.
    // tick() s'appuie sur `arrangements.length` pour ne rien animer.
    if (!N) { arrangements = []; depth = []; phase = []; return; }
    var cols = mobileCols();
    if (cols > 0) { buildGridArrangements(cols); return; }
    var base = Array.from({ length: N }, function (_, i) { return i; });
    arrangements = [];
    for (var s = 0; s < 4; s++) {
      var rnd = rng(1000 + s * 977);
      var weights = base.map(function () { return 1 + rnd() * 2.4; });
      var order = shuffle(base, rnd);
      var horiz = s % 2 === 0;
      var out = new Array(N);
      partition(0, 0, 1, 1, order, weights, horiz, out);
      arrangements.push(out);
    }
    var r2 = rng(42);
    depth = base.map(function () { return 0.25 + r2() * 0.85; });
    phase = base.map(function () { return r2() * Math.PI * 2; });
  }

  // ---------------------------------------------------------------------------
  // DOM: build tiles
  // ---------------------------------------------------------------------------
  var grid = document.getElementById("grid");
  var tiles = [];

  // Number of images per row on mobile (0 = desktop free mosaic).
  function mobileCols() {
    var w = window.innerWidth;
    if (w > 640) return 0;
    if (w <= 340) return 1;
    if (w <= 480) return 2;
    return 3;
  }

  function ghostSpan(txt) {
    var g = document.createElement("div");
    g.className = "ghost";
    g.textContent = txt;
    return g;
  }

  // Returns an <img> when the product has a photo, else a numbered placeholder.
  function slotNode(a) {
    if (a.img) {
      var im = document.createElement("img");
      im.src = a.img; im.alt = a.title; im.loading = "lazy";
      im.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;";
      // If the photo fails to load, fall back to the numbered placeholder.
      im.onerror = function () {
        if (im.parentNode) { im.parentNode.replaceChild(ghostSpan(a.numLabel), im); }
      };
      return im;
    }
    return ghostSpan(a.numLabel);
  }

  // Builds an <img> for a specific URL, falling back to the numbered placeholder.
  function imgEl(url, alt, ghostLabel) {
    if (url) {
      var im = document.createElement("img");
      im.src = url; im.alt = alt || ""; im.loading = "lazy";
      im.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;";
      im.onerror = function () { if (im.parentNode) im.parentNode.replaceChild(ghostSpan(ghostLabel), im); };
      return im;
    }
    return ghostSpan(ghostLabel);
  }

  // Derives the thumbnail URL from a full image URL (name.webp -> name-thumb.webp).
  //
  // ⚠ CONTRAT PARTAGÉ AVEC LE BACKEND — ne pas modifier isolément.
  // La règle appartient à backend/media/naming.py (thumb_name). Ce regex en est
  // le miroir exact ; backend/tests/test_media_naming.py exécute les DEUX
  // implémentations sur les mêmes cas et échoue si elles divergent.
  // Toute divergence = le front demande des vignettes qui n'existent pas (404).
  //
  // TODO : faire renvoyer l'URL de vignette par l'API (champ `thumbs`) et
  // supprimer cette dérivation — le contrat cessera alors d'être implicite.
  // C'est la seule correction de fond ; en attendant, le test d'équivalence
  // ci-dessus est le filet.
  function thumbUrl(u) { return u ? u.replace(/(\.[a-zA-Z0-9]+)(\?.*)?$/, "-thumb$1$2") : u; }

  // Small image for tiles / cart : loads the thumbnail, falls back to the full
  // image if the thumb is missing (e.g. seed images), then to the placeholder.
  function smallImg(url, alt, ghostLabel) {
    if (!url) return ghostSpan(ghostLabel);
    var im = document.createElement("img");
    im.alt = alt || ""; im.loading = "lazy";
    im.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;";
    var full = url, usedFull = (thumbUrl(url) === url);
    im.onerror = function () {
      if (!usedFull) { usedFull = true; im.src = full; }
      else if (im.parentNode) { im.parentNode.replaceChild(ghostSpan(ghostLabel), im); }
    };
    im.src = thumbUrl(url);
    return im;
  }

  function lbImages(a) { return (a.images && a.images.length) ? a.images : (a.img ? [a.img] : []); }
  function carouselImage(a) {
    var imgs = lbImages(a);
    var url = imgs.length ? imgs[Math.min(state.lbImg || 0, imgs.length - 1)] : "";
    var node = imgEl(url, a.title, a.numLabel);
    if (url && node.tagName === "IMG") {
      node.style.cursor = "zoom-in";
      node.addEventListener("click", function (e) { e.stopPropagation(); openZoom(url); });
    }
    return node;
  }

  function openZoom(url) {
    var z = el("div", "zoom-scrim");
    var im = document.createElement("img");
    im.className = "zoom-img"; im.src = url; im.alt = "";
    z.appendChild(im);
    z.addEventListener("click", function () { z.remove(); });
    document.body.appendChild(z);
  }

  function inCartQty(id) { return state.cart[id] || 0; }
  function isSoldOut(a) { return a.stock <= 0; }

  // Point de passage UNIQUE de la mise au panier.
  // `state.stockTrusted` : tant que l'API n'a pas confirmé le stock, on refuse
  // toute vente. Le snapshot du build date du dernier déploiement et pourrait
  // remettre en vente une pièce unique déjà partie — paiement encaissé, rien à
  // expédier. C'est le risque n°1 du projet : la garde est ici.
  function canAdd(a) {
    return state.stockTrusted && a.stock > 0 && inCartQty(a.id) < a.stock;
  }

  function buildTiles() {
    grid.innerHTML = "";
    tiles = [];
    articles.forEach(function (a) {
      var tile = document.createElement("div");
      tile.className = "tile";
      tile.style.background = tileBg(a.i);
      tile.setAttribute("data-tile", "");

      var ph = document.createElement("div");
      ph.className = "ph";
      ph.appendChild(smallImg(a.img, a.title, a.numLabel));
      tile.appendChild(ph);

      // add-to-cart quick button (hidden when sold out)
      if (!isSoldOut(a)) {
        var add = document.createElement("button");
        add.className = "tile-add";
        add.type = "button";
        add.textContent = "+";
        add.title = UI[state.lang].add;
        // Stock non confirmé par l'API : bouton inerte. buildTiles() est rejoué
        // dès que l'API répond, ce qui le réactive.
        add.disabled = !state.stockTrusted;
        add.addEventListener("click", function (e) { e.stopPropagation(); addToCart(a.id); });
        tile.appendChild(add);
      }

      // meta overlay

  // ---------------------------------------------------------------------------
  // Scroll-driven layout loop
  // ---------------------------------------------------------------------------
  var driver = document.getElementById("driver");
  var lastKey = null, dirty = true;

  function progress() {
    if (!driver) return 0;
    var r = driver.getBoundingClientRect();
    var travel = driver.offsetHeight - window.innerHeight;
    if (travel <= 0) return 0;
    return Math.max(0, Math.min(1, -r.top / travel));
  }
  function smooth(t) { return t * t * (3 - 2 * t); }
  function lerpRect(A, B, f) {
    return { x: A.x + (B.x - A.x) * f, y: A.y + (B.y - A.y) * f, w: A.w + (B.w - A.w) * f, h: A.h + (B.h - A.h) * f };
  }

  function tick() {
    requestAnimationFrame(tick);
    if (!arrangements.length) return;
    var W = grid.clientWidth, H = grid.clientHeight;
    if (!W || !H) return;
    var p = progress();
    var eff = state.effect;
    var gap = 2;
    var AN = arrangements.length;

    if (eff === "crossfade") {
      for (var b = 0; b < tiles.length; b++) {
        var slotb = tiles[b].querySelector("[data-slotb]");
        if (slotb) {
          var o = 0.5 + 0.5 * Math.sin(p * Math.PI * 2 * 2.5 + phase[b]);
          slotb.style.opacity = o.toFixed(3);
        }
      }
    }

    var key = eff + ":" + gap + ":" + W + "x" + H + ":" + p.toFixed(4);
    if (key === lastKey && !dirty) return;
    lastKey = key; dirty = false;

    for (var i = 0; i < tiles.length; i++) {
      var el = tiles[i];
      var rect, tx = 0, ty = 0, sc = 1;
      if (eff === "recompose") {
        var t = p * (AN - 1);
        var idx = Math.floor(t);
        if (idx >= AN - 1) idx = AN - 2;
        var f = smooth(t - idx);
        rect = lerpRect(arrangements[idx][i], arrangements[idx + 1][i], f);
      } else if (eff === "parallax") {
        rect = arrangements[0][i];
        var d = depth[i];
        ty = (p - 0.5) * H * 0.55 * d;
        sc = 1 + (p * 0.12 * d);
      } else {
        rect = arrangements[0][i];
      }
      var x = rect.x * W + gap / 2;
      var y = rect.y * H + gap / 2;
      var w = Math.max(2, rect.w * W - gap);
      var h = Math.max(2, rect.h * H - gap);
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.width = w + "px";
      el.style.height = h + "px";
      el.style.transform = (tx || ty || sc !== 1) ? ("translate(" + tx + "px," + ty + "px) scale(" + sc + ")") : "";
      var fs = Math.max(9, Math.min(17, h * 0.052));
      el.style.setProperty("--fs", fs + "px");
    }
  }

  // ---------------------------------------------------------------------------
  // Cart logic
  // ---------------------------------------------------------------------------
  function cartCount() {
    var c = 0;
    for (var k in state.cart) c += state.cart[k];
    return c;
  }
  function cartTotal() {
    var t = 0;
    for (var k in state.cart) {
      var a = articlesById[k];
      if (a) t += a.price * state.cart[k];
    }
    return t;
  }
  // Pourquoi l'ajout est refusé. Distinguer les cas : dire « Déjà dans le
  // panier » alors que le stock n'est simplement pas vérifié serait un mensonge.
  function addBlockedReason(a) {
    if (!state.stockTrusted) return UI[state.lang].stockUnverified;
    return isSoldOut(a) ? UI[state.lang].soldout : UI[state.lang].inCart;
  }

  function addToCart(id) {
    var a = articlesById[id];
    if (!a) return;
    if (!canAdd(a)) {
      showToast(addBlockedReason(a) + " — " + a.title);
      return;
    }
    state.cart[id] = (state.cart[id] || 0) + 1;
    persist();
    updateCartCount();
    if (state.cartOpen) renderCart();
    showToast(UI[state.lang].added + " — " + a.title);
  }
  function setQty(id, q) {
    var a = articlesById[id];
    var max = a ? a.stock : 0;
    if (q > max) q = max;
    if (q <= 0) delete state.cart[id];
    else state.cart[id] = q;
    persist();
    updateCartCount();
    renderCart();
  }
  function updateCartCount() {
    document.getElementById("cartCount").textContent = cartCount();
  }

  var toastTimer = null;
  function showToast(msg) {
    var host = document.getElementById("toasts");
    host.innerHTML = "";
    var t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    host.appendChild(t);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { host.innerHTML = ""; }, 2200);
  }

  // Show a specific carousel image and sync image / dots / thumbs / counter.
  function lbSetImg(idx) {
    if (state.lb == null) return;
    var a = articles[state.lb];
    var imgs = lbImages(a);
    if (!imgs.length) return;
    state.lbImg = ((idx % imgs.length) + imgs.length) % imgs.length;
    var scrim = modals.querySelector(".lb-scrim");
    if (!scrim) return;
    var box = scrim.querySelector(".lb-img");
    if (box) {
      var oldImg = box.querySelector("img, .ghost");
      if (oldImg) oldImg.remove();
      box.insertBefore(carouselImage(a), box.firstChild);
    }
    scrim.querySelectorAll(".lb-dot").forEach(function (d, k) { d.classList.toggle("on", k === state.lbImg); });
    scrim.querySelectorAll(".lb-thumb").forEach(function (t, k) { t.classList.toggle("on", k === state.lbImg); });
    var cnt = scrim.querySelector(".lb-count");
    if (cnt) cnt.textContent = (state.lbImg + 1) + " / " + imgs.length;
  }
  function lbGo(delta) {
    if (state.lb == null) return;
    if (lbImages(articles[state.lb]).length < 2) return;
    lbSetImg((state.lbImg || 0) + delta);
  }
  function closeLb() {
    state.lb = null;
    if (!state.cartOpen) document.body.style.overflow = "";

  function openCart() {
    state.cartOpen = true;
    state.checkout = false;
    document.body.style.overflow = "hidden";

  function buildLightbox(a) {

    var scrim = el("div", "lb-scrim");

    var imgs = lbImages(a);

    if (imgs.length > 1) {

      prev.addEventListener("click", function (e) { e.stopPropagation(); lbGo(-1); });
      var next = txt("button", "lb-nav next", "›"); next.type = "button";
      next.addEventListener("click", function (e) { e.stopPropagation(); lbGo(1); });
      var count = txt("div", "lb-count", (state.lbImg + 1) + " / " + imgs.length);

    if (imgs.length > 1) {

        (function (full) { ti.onerror = function () { ti.onerror = null; ti.src = full; }; }(src));
        ti.src = thumbUrl(src);
        th.appendChild(ti);
        th.addEventListener("click", function (e) { e.stopPropagation(); lbSetImg(k); });
        thumbs.appendChild(th);
      });

    var body = el("div", "lb-body");

    body.appendChild(top);
    body.appendChild(txt("h2", "lb-title", a.title));
    body.appendChild(txt("p", "lb-desc", a.desc));

    // spec line: colour · size · ref
    var specs = [];
    if (a.color) specs.push(ui.color + " " + a.color);
    if (a.size) specs.push(ui.size + " " + a.size);
    if (a.ref) specs.push(ui.ref + " " + a.ref);
    if (specs.length) {
      var spec = txt("div", "lb-spec", specs.join("  ·  "));
      spec.style.cssText = "font-size:11px;letter-spacing:0.06em;opacity:0.6;margin-top:6px;";
      body.appendChild(spec);
    }

    var buy = el("div", "lb-buy");
    var lbPrice = txt("span", "lb-price", isSoldOut(a) ? ui.soldout : money(a.price));
    if (isSoldOut(a)) lbPrice.classList.add("sold");
    buy.appendChild(lbPrice);
    if (!isSoldOut(a)) {
      var addBtn = txt("button", "btn-primary", ui.add);
      addBtn.type = "button";
      addBtn.disabled = !canAdd(a);
      if (!canAdd(a)) { addBtn.textContent = ui.inCart; addBtn.style.opacity = "0.45"; addBtn.style.cursor = "default"; }
      addBtn.addEventListener("click", function () { if (canAdd(a)) { addToCart(a.id); openCart(); } });
      buy.appendChild(addBtn);
    }
    var closeBtn = txt("button", "btn-ghost", ui.close);
    closeBtn.type = "button";
    closeBtn.addEventListener("click", closeLb);
    buy.appendChild(closeBtn);
    body.appendChild(buy);

    card.appendChild(body);
    scrim.appendChild(card);
    return scrim;

  function buildCartLayer() {
    var frag = document.createDocumentFragment();
    var scrim = el("div", "cart-scrim");
    scrim.addEventListener("click", closeCart);
    frag.appendChild(scrim);

    var drawer = el("div", "cart");
    drawer.appendChild(buildCartInner());
    frag.appendChild(drawer);

    var wrap = el("div", "");
    wrap.appendChild(frag);
    return wrap;
  }

  function buildCartInner() {
    var ui = UI[state.lang];
    var box = el("div", "");
    box.style.display = "flex";
    box.style.flexDirection = "column";
    box.style.height = "100%";

    var head = el("div", "cart-head");
    head.appendChild(txt("h2", "", state.checkout ? ui.confirmTitle : (ui.cart + " (" + cartCount() + ")")));
    var x = txt("button", "cart-close", "✕");
    x.type = "button";
    x.addEventListener("click", closeCart);
    head.appendChild(x);
    box.appendChild(head);

    if (state.checkout) {
      box.appendChild(buildConfirm());

    } else {
      keys.forEach(function (k) {
        var a = articlesById[k];

    // footer with totals

    subLine.appendChild(txt("span", "", money(sub)));

    var shipLine = el("div", "cart-line");
    shipLine.appendChild(txt("span", "", ui.shipping));
    shipLine.appendChild(txt("span", "", ui.free));
    foot.appendChild(shipLine);
    var totalLine = el("div", "cart-total");
    totalLine.appendChild(txt("span", "lbl", ui.total));
    totalLine.appendChild(txt("span", "val", money(sub)));
    foot.appendChild(totalLine);

    var co = txt("button", "btn-primary checkout-btn", ui.checkout);

  function buildCartItem(a, qty) {
    var ui = UI[state.lang];
    var row = el("div", "ci");
    var thumb = el("div", "ci-thumb");
    thumb.style.background = tileBg(a.i);
    thumb.appendChild(smallImg(a.img, a.title, a.numLabel));
    row.appendChild(thumb);

    var main = el("div", "ci-main");
    main.appendChild(txt("div", "ci-title", a.title));
    main.appendChild(txt("div", "ci-cat", (CAT_LABEL[state.lang][a.cat] || a.cat) + " · " + money(a.price)));

    var bottom = el("div", "ci-bottom");
    var q = el("div", "qty");
    var minus = txt("button", "", "−"); minus.type = "button";
    minus.addEventListener("click", function () { setQty(a.id, qty - 1); });
    var span = txt("span", "", String(qty));
    var plus = txt("button", "", "+"); plus.type = "button";
    if (qty >= a.stock) { plus.disabled = true; plus.style.opacity = "0.3"; plus.style.cursor = "default"; }
    plus.addEventListener("click", function () { setQty(a.id, qty + 1); });
    q.appendChild(minus); q.appendChild(span); q.appendChild(plus);
    bottom.appendChild(q);
    bottom.appendChild(txt("span", "ci-price", money(a.price * qty)));
    main.appendChild(bottom);

    var rm = txt("button", "ci-remove", ui.remove);
    rm.type = "button";
    rm.addEventListener("click", function () { setQty(a.id, 0); });
    main.appendChild(rm);

    row.appendChild(main);

  }

  function buildConfirm() {
    var ui = UI[state.lang];
    var wrap = el("div", "cart-items");
    var c = el("div", "confirm");
    c.appendChild(txt("div", "tick", "✓"));
    c.appendChild(txt("h3", "", ui.confirmTitle));
    c.appendChild(txt("p", "", ui.confirmMsg));
    c.appendChild(txt("div", "order", ui.order + " " + state.orderNo));
    var cont = txt("button", "btn-primary", ui.continue);
    cont.type = "button";
    cont.style.marginTop = "22px";
    cont.addEventListener("click", closeCart);
    c.appendChild(cont);

  function doCheckout() {
    var keys = Object.keys(state.cart);
    if (!keys.length) return;
    // Real payment via the backend (Stripe Checkout hosted page).
    if (typeof fetch === "function" && API_BASE) {
      // La clé du panier EST l'id produit ; on ignore toute entrée orpheline.
      var items = keys.filter(function (k) { return articlesById[k]; })
        .map(function (k) { return { id: Number(k), qty: state.cart[k] }; });
      var btn = document.querySelector(".checkout-btn");
      if (btn) { btn.disabled = true; btn.textContent = "…"; }
      fetch(API_BASE + "api/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(items)
      }).then(function (r) {
        if (r.ok) return r.json();
        return r.json().catch(function () { return {}; }).then(function (e) { throw new Error(e.detail || "Erreur paiement"); });
      }).then(function (d) {
        if (d && d.url) { window.location.href = d.url; }
        else { throw new Error("Réponse invalide"); }
      }).catch(function (e) {
        showToast((state.lang === "fr" ? "Paiement indisponible — " : "Payment unavailable — ") + e.message);
        if (btn) { btn.disabled = false; btn.textContent = UI[state.lang].checkout; }
      });
      return;
    }
    // Fallback démo (sans backend) : confirmation simulée.
    state.orderNo = "ABC-" + Date.now().toString(36).toUpperCase().slice(-6);
    state.cart = {};
    state.checkout = true;
    persist();
    updateCartCount();
    renderCart();
  }

  function renderCart() {
    if (!state.cartOpen) return;
    var drawer = modals.querySelector(".cart");
    if (drawer) {
      drawer.innerHTML = "";
      drawer.appendChild(buildCartInner());
    }
  }

  // Replace the embedded catalogue with live data from the backend.
  function applyCatalog(list) {
    CATALOG.length = 0;
    list.forEach(function (p) {
      CATALOG.push({
        id: String(p.id), name: p.name, cat: p.cat, price: Number(p.price) || 0,
        color: p.color || "", size: p.size || "", ref: p.ref || "",
        qty: Number(p.qty) || 0, img: p.img || "",
        images: Array.isArray(p.images) ? p.images : [],
        descFr: p.descFr || "", descEn: p.descEn || "",
      });
    });
    N = CATALOG.length;

  // ---------------------------------------------------------------------------
  // Boot — snapshot d'abord (affichage immédiat), API ensuite (vérité du stock).
  //
  // 1. Le snapshot injecté au build rend la mosaïque tout de suite, depuis le
  //    CDN : plus de cascade HTML -> JS -> fetch, plus de page vide quand
  //    Railway dort. Mais `stockTrusted` reste faux : on affiche, on ne vend pas.
  // 2. L'API confirme le stock -> `stockTrusted` passe à vrai, les boutons
  //    « Ajouter » s'activent.
  // 3. Si l'API échoue : le snapshot reste affiché (mieux que rien), la vente
  //    reste bloquée, et un bandeau l'explique.
  // ---------------------------------------------------------------------------
  var gridMsg = document.getElementById("gridMsg");

  // État : "loading" | "error" | "stale" | null (null = tout va bien).
  function setGridMsg(kind) {
    state.gridMsg = kind || null;
    if (!state.gridMsg) { gridMsg.classList.remove("on"); gridMsg.innerHTML = ""; return; }
    gridMsg.innerHTML = UI[state.lang][GRID_MSG_KEY[state.gridMsg]];
    gridMsg.classList.add("on");
  }
  var GRID_MSG_KEY = { loading: "loading", error: "loadError", stale: "stockUnknown" };

  // Le message « stock indisponible » se superpose à la mosaïque : il ne doit
  // pas masquer les pièces, seulement expliquer pourquoi on ne peut pas acheter.
  function showStaleBanner() {
    setGridMsg(null);
    staleBanner.innerHTML = UI[state.lang].stockUnknown;
    staleBanner.classList.add("on");
  }
  var staleBanner = document.getElementById("staleBanner");

  applyCatalog(embeddedCatalog());   // 1. snapshot : affichage immédiat
  renderChrome();
  requestAnimationFrame(tick);

  // Live catalogue source. On Vercel, set window.ABC_API_BASE to your Railway
  // URL (e.g. "https://abc-api.up.railway.app/") so the shop loads live data.
  var API_BASE = (typeof window !== "undefined" && window.ABC_API_BASE) ? String(window.ABC_API_BASE) : "";
  if (API_BASE && API_BASE.slice(-1) !== "/") API_BASE += "/";
  setGridMsg(CATALOG.length ? null : "loading");

  function onCatalogFailure() {
    // Snapshot présent : on le garde affiché, vente bloquée (stockTrusted faux).
    // Rien du tout : la boutique n'a rien à montrer.
    if (CATALOG.length) { showStaleBanner(); } else { setGridMsg("error"); }
  }

  if (typeof fetch === "function" && (API_BASE || location.protocol === "http:" || location.protocol === "https:")) {
    fetch(API_BASE + "api/products")
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (list) {
        if (!list || !list.length) { onCatalogFailure(); return; }
        // ORDRE IMPORTANT : `stockTrusted` doit être vrai AVANT applyCatalog(),
        // car buildTiles() lit ce flag pour (dé)sactiver les boutons « + ».
        // L'inverse laisserait des boutons inertes malgré une API qui répond.
        state.stockTrusted = true;
        applyCatalog(list);            // l'API fait foi -> la vente s'ouvre
        renderChrome();
        setGridMsg(null);
      })
      .catch(onCatalogFailure);        // 3. dégradation
  } else {
    onCatalogFailure(); // file:// — pas d'API joignable
  }

  // Retour depuis Stripe : géré par les pages dédiées success.html (qui vide
  // abc_cart) et cancel.html — success_url/cancel_url pointent dessus.
})();
</script>
</body>
</html>
